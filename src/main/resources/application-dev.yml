server:
  port: 8080
  tomcat:
    max-part-count: 50          # Fix lỗi FileCountLimitExceededException (default Tomcat 10=10 parts)
    # max-part-header-size: 512   # Optional: nếu cần giới hạn header mỗi part (default 512 bytes ở Tomcat mới)
spring:
  servlet:
    multipart:
      max-file-size: 10MB       # Max size mỗi file (thumbnail/images)
      max-request-size: 50MB    # Max tổng request (tất cả files + text fields)
      file-size-threshold: 2MB  # Khi file > 2MB thì write ra disk thay vì giữ trong memory
      enabled: true             # Bật multipart (mặc định true, nhưng set cho rõ)

  config:
    activate:
      on-profile: dev
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/my_tutorial_db}
    username: ${POSTGRES_USER:user}
    password: ${POSTGRES_PASSWORD:123abc}
#    url: ${POSTGRES_URL:jdbc:p6spy:postgresql://localhost:5432/my_tutorial_db} -> bật lên nếu muốn dùng
#    driver-class-name: com.p6spy.engine.spy.P6SpyDriver -> bật lên nếu muốn dùng
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
#    show-sql: false -> tắt nếu muốn dùng p6spy
    hibernate:
      ddl-auto: update
  kafka:
    bootstrap-servers: localhost:29092
open:
  api:
    title: API-service document
    version: v1.0.0
    description: description for document
    serverUrl: http://localhost:${server.port}
    serverName: Server Dev

